<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter System Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="authShell">
        <div class="authCard">
            <h1>HUNTER SYSTEM</h1>
            <p class="authSubtitle">Enter the trail. Protect your account.</p>

            <form id="signInForm" class="authForm">
                <h2>Sign In</h2>
                <label for="loginName">Hunter Name</label>
                <input id="loginName" name="loginName" type="text" placeholder="Enter your hunter name" required>

                <label for="loginPassword">Password</label>
                <input id="loginPassword" name="loginPassword" type="password" placeholder="Enter your password" required>

                <button type="submit">Enter Hunter System</button>
            </form>

            <form id="createAccountForm" class="authForm authFormAlt">
                <h2>Create Account</h2>
                <label for="createName">New Hunter Name</label>
                <input id="createName" name="createName" type="text" placeholder="Choose a hunter name" required>

                <label for="createPassword">Password</label>
                <input id="createPassword" name="createPassword" type="password" placeholder="Choose a password" required>

                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm your password" required>

                <button type="submit">Create Hunter Account</button>
            </form>

            <p id="authMessage" class="authMessage" role="status"></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
